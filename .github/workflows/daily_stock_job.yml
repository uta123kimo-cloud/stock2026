name: Stock Analysis v12.1 Auto-Job

on:
  schedule:
    # 台灣時間 15:30 (UTC 07:30) 盤後定調
    - cron: '30 7 * * *'
    # 台灣時間 10:30 (UTC 02:00) 盤中觀察
    - cron: '0 2 * * *'
  workflow_dispatch: # 手動觸發按鈕

permissions:
  contents: write

jobs:
  run-trading-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴套件
        run: |
          pip install -r requirements.txt

      - name: 執行交易核心 V12.1
        env:
          # 這裡必須對應你剛才設定的 Secret 名稱
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          mkdir -p storage  # 強制建立資料夾
          python engine_21.py

      - name: 提交並推送結果
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 這裡改用 git add . 捕捉所有新增的日期檔名
          git add storage/
          
          if git diff --staged --quiet; then
            echo "沒有偵測到新產出的數據檔。"
          else
            git commit -m "自動更新數據: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
