name: 資源法每日計算 v4.0

# ── 1. 觸發條件 ──────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: '執行模式 (auto/intraday/postmarket)'
        required: false
        default: 'auto'
  schedule:
    # ── 盤中：台灣時間 09:32 = UTC 01:32
    - cron: "32 1 * * 1-5"
    # ── 盤中：台灣時間 10:31 = UTC 02:31
    - cron: "31 2 * * 1-5"
    # ── 盤中：台灣時間 11:28 = UTC 03:28
    - cron: "28 3 * * 1-5"
    # ── 盤後：台灣時間 18:00 = UTC 10:00
    - cron: "0 10 * * 1-5"

# ── 2. 環境變數 ──────────────────────────────────────────────
env:
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GITHUB_OWNER: ${{ github.repository_owner }}
  GITHUB_REPO: ${{ github.event.repository.name }}
  TZ: Asia/Taipei
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ── 3. 防止多個工作流衝突 ────────────────────────────────────
concurrency:
  group: stock-data
  cancel-in-progress: false

# ── 4. 計算任務 ──────────────────────────────────────────────
jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Step 1: 檢出儲存庫 ─────────────────────────────────
      - name: 檢出儲存庫
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Step 2: 同步最新版本 (加上 autostash) ───────────────────────
      - name: 同步最新版本
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || echo "No remote changes"

      # ── Step 3: 設定 Python ─────────────────────────────────
      - name: 安裝 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Step 4: 安裝依賴 ────────────────────────────────────
      - name: 安裝依賴項
        run: |
          pip install --upgrade pip
          pip install \
            "yfinance==0.2.54" \
            "pandas==2.2.3" \
            "numpy>=1.26.4,<2.0" \
            "scipy==1.13.1" \
            "pyarrow==16.1.0" \
            "requests==2.32.3" \
            "finmind"

      # ── Step 5: 準備儲存目錄 ────────────────────────────────
      - name: 準備儲存目錄
        run: |
          mkdir -p storage/{v4,v12,regime,market,logs,cache}
          mkdir -p data

      # ── Step 6: 清除過期 suffix 快取 ────────────────────────
      - name: 清除過期 suffix 快取
        shell: python
        run: |
          import json, os
          file_path = 'storage/cache/suffix_cache.json'
          if os.path.exists(file_path):
              with open(file_path, 'r', encoding='utf-8') as f:
                  try: cache = json.load(f)
                  except: cache = {}
              if cache:
                  cleaned = {k: v for k, v in cache.items() if v is not None}
                  removed = len(cache) - len(cleaned)
                  with open(file_path, 'w', encoding='utf-8') as f:
                      json.dump(cleaned, f, indent=2, ensure_ascii=False)
                  print(f"✅ 清除 {removed} 筆 null suffix 快取")

      # ── Step 7: 判斷執行模式 ──────────────────────
      - name: 判斷執行模式
        run: |
          TW_HOUR=$(TZ=Asia/Taipei date +"%H")
          TW_TIME=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S')
          echo "🕐 台灣時間: ${TW_TIME}"
          echo "🕐 台灣時間小時: ${TW_HOUR}"

          MANUAL_MODE="${{ github.event.inputs.run_mode }}"
          if [ "$MANUAL_MODE" = "intraday" ] || [ "$MANUAL_MODE" = "postmarket" ]; then
            echo "RUN_MODE=${MANUAL_MODE}" >> $GITHUB_ENV
            echo "📋 手動指定執行模式: ${MANUAL_MODE}"
          elif [ "$TW_HOUR" -ge 9 ] && [ "$TW_HOUR" -le 14 ]; then
            echo "RUN_MODE=intraday" >> $GITHUB_ENV
            echo "📈 自動判斷: 盤中 (intraday) — 台灣時間 ${TW_HOUR}:xx"
          else
            echo "RUN_MODE=postmarket" >> $GITHUB_ENV
            echo "📊 自動判斷: 盤後 (postmarket) — 台灣時間 ${TW_HOUR}:xx"
          fi

      # ── Step 8: 驗證 FinMind TOKEN ──────────────────────────
      - name: 驗證 FinMind TOKEN
        continue-on-error: true
        shell: python
        run: |
          import requests, os
          token = os.environ.get('FINMIND_TOKEN', '')
          if not token:
              print("⚠️ FINMIND_TOKEN 未設定，將使用 Yahoo Finance 備援")
          else:
              print(f"✅ FINMIND_TOKEN 已設定 (長度:{len(token)})")
              try:
                  resp = requests.get(
                      'https://api.finmindtrade.com/api/v4/data',
                      params={
                          'dataset': 'TaiwanStockPrice',
                          'data_id': 'Y9999',
                          'start_date': '2025-01-01',
                          'token': token
                      }, timeout=15
                  )
                  data = resp.json()
                  if data.get('status') == 200 and data.get('data'):
                      print(f"✅ FinMind Y9999 (TAIEX) 連線正常，{len(data['data'])} 筆")
                  else:
                      print(f"❌ FinMind Y9999 異常: {data.get('msg','')}")
              except Exception as e:
                  print(f"⚠️ FinMind 測試失敗: {e}")

      # ── Step 9: 運行主計算 (自動找檔版) ───────────────────────
      - name: 運行計算 (主要)
        id: compute_run
        run: |
          echo "🕐 台灣時間: $(TZ=Asia/Taipei date)"
          echo "📋 執行模式: $RUN_MODE"
          
          # 自動在全專案尋找 daily_run.py
          SCRIPT_PATH=$(find . -name "daily_run.py" | head -n 1)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "❌ 錯誤：整個專案都找不到 daily_run.py！"
            echo "🔍 目前專案的檔案結構如下："
            ls -R
            exit 1
          else
            echo "🚀 成功找到主程式：$SCRIPT_PATH"
            python "$SCRIPT_PATH"
          fi
       

      # ── Step 10: 重試（首次失敗時）─────────────────────────
      - name: 重試主計算 (若首次失敗)
        if: steps.compute_run.outcome == 'failure'
        run: |
          echo "⚠️ 首次失敗，等待 90s 後重試..."
          sleep 90
          SCRIPT_PATH=$(find . -name "daily_run.py" | head -n 1)
          python "$SCRIPT_PATH"

      # ── Step 11: 運行 portfolio_manager (自動找檔版) ──────────
      - name: 運行 portfolio_manager.py
        
        run: |
          PM_PATH=$(find . -name "portfolio_manager.py" | head -n 1)
          if [ -n "$PM_PATH" ]; then
            echo "▶️ 執行 $PM_PATH"
            python "$PM_PATH"
          else
            echo "ℹ️ 找不到 portfolio_manager.py，跳過"
          fi

     # ── Step 12: 提交並推送 (徹底修復資料不更新問題) ─────────
      - name: 提交並推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. 確保所有產出的 json 與資料都進入暫存區
          git add storage/ data/ *.json 2>/dev/null || true

          # 2. 如果沒有變動就跳過
          if git diff --staged --quiet; then
            echo "ℹ️ 資料無變動，無需更新"
            exit 0
          fi

          # 3. 先 Commit 鎖定本地變動，讓工作區變乾淨
          TIMESTAMP=$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')
          git commit -m "🤖 自動更新交易資料: ${TIMESTAMP}"

          # 4. 使用強勢重試與 Rebase
          for i in 1 2 3; do
            echo "=== 嘗試同步至遠端 $i/3 ==="
            # 先拉取遠端變動，若有衝突以本地剛 Commit 的資料為主
            if git pull --rebase -X theirs origin main && git push origin main; then
              echo "✅ 資料已成功推送到儲存庫，網頁應會同步更新"
              exit 0
            fi
            sleep 10
          done
          echo "❌ 多次推送失敗，請檢查權限"
          exit 1

      # ── Step 13: 盤後全量掃描摘要 ────────────────────────────
      - name: 盤後完成摘要
        if: env.RUN_MODE == 'postmarket'
        run: |
          echo "📊 盤後全量掃描完成 ($(TZ=Asia/Taipei date))"
          if [ -f storage/v12/v12_latest.json ]; then
            echo "✅ V12 快照已更新"
            python -c "
          import json
          with open('storage/v12/v12_latest.json') as f:
              d = json.load(f)
          pos = d.get('positions', [])
          print(f'  部位數: {len(pos)}')
          "
          fi

      # ── Step 14: 失敗通知 ──────────────────────────────────
      - name: 失敗通知
        if: failure()
        run: |
          echo "❌ 計算流程失敗 ($(TZ=Asia/Taipei date))"
