name: 資源法每日計算 v4.0

# ── 1. 觸發條件 (整合手動與定時) ───────────────────────────
on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: '執行模式 (auto/intraday/postmarket)'
        required: false
        default: 'auto'
  schedule:
    # ── 盤中：台灣時間 09:32 = UTC 01:32
    - cron: "32 1 * * 1-5"
    # ── 盤中：台灣時間 10:31 = UTC 02:31
    - cron: "31 2 * * 1-5"
    # ── 盤中：台灣時間 11:28 = UTC 03:28
    - cron: "28 3 * * 1-5"
    # ── 盤後：台灣時間 18:00 = UTC 10:00
    - cron: "0 10 * * 1-5"

# ── 2. 環境變數 (維持原變數不變) ──────────────────────────
env:
  FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GITHUB_OWNER: ${{ github.repository_owner }}
  GITHUB_REPO: ${{ github.event.repository.name }}
  TZ: Asia/Taipei
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ── 3. 防止多個工作流衝突 ──────────────────────────────────
concurrency:
  group: stock-data
  cancel-in-progress: false

# ── 4. 計算任務 ────────────────────────────────────────────
jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. 檢出儲存庫 ──
      - name: 檢出儲存庫
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. 同步最新版本 ──
      - name: 同步最新版本
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || echo "No remote changes"

      # ── 3. 設定 Python ──
      - name: 安裝 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 4. 安裝依賴 ──
      - name: 安裝依賴項
        run: |
          pip install --upgrade pip
          pip install \
            "yfinance==0.2.54" \
            "pandas==2.2.3" \
            "numpy>=1.26.4,<2.0" \
            "scipy==1.13.1" \
            "pyarrow==16.1.0" \
            "requests==2.32.3" \
            "finmind"

      # ── 5. 準備儲存目錄 ──
      - name: 準備儲存目錄
        run: |
          mkdir -p storage/{v4,v12,regime,market,logs,cache}
          mkdir -p data

      # ── 6. 清除快取 ──
      - name: 清除過期 suffix 快取
        shell: python
        run: |
          import json, os
          file_path = 'storage/cache/suffix_cache.json'
          if os.path.exists(file_path):
              with open(file_path, 'r', encoding='utf-8') as f:
                  try: cache = json.load(f)
                  except: cache = {}
              if cache:
                  cleaned = {k: v for k, v in cache.items() if v is not None}
                  with open(file_path, 'w', encoding='utf-8') as f:
                      json.dump(cleaned, f, indent=2, ensure_ascii=False)

      # ── 7. 判斷執行模式 ──
      - name: 判斷執行模式
        run: |
          TW_HOUR=$(date +"%H")
          echo "台灣時間小時: ${TW_HOUR}"
          if [ "$TW_HOUR" -ge 9 ] && [ "$TW_HOUR" -le 14 ]; then
            echo "RUN_MODE=intraday" >> $GITHUB_ENV
          else
            echo "RUN_MODE=postmarket" >> $GITHUB_ENV
          fi

      # ── 8. 驗證 Token ──
      - name: 驗證 FinMind TOKEN
        run: |
          python -c "import os; print('TOKEN OK' if os.environ.get('FINMIND_TOKEN') else 'NO TOKEN')"

      # ── 9. 運行計算 ──
      - name: 運行計算
        id: compute_run
        run: python jobs/daily_run.py
        continue-on-error: true

      - name: 重試主計算
        if: steps.compute_run.outcome == 'failure'
        run: |
          sleep 90
          python jobs/daily_run.py

      # ── 10. 運行部位管理 ──
      - name: 運行 portfolio_manager.py
        run: |
          if [ -f engine/portfolio_manager.py ]; then
            python engine/portfolio_manager.py
          else
            echo "Skipping portfolio_manager.py (File not found)"
          fi

      # ── 11. 提交與推送（修正：先 stash 再 pull，避免 unstaged 衝突）──
      - name: 提交變更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add storage/ data/ stock_set.json holdings.json streamlit_display.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "無變更，跳過 commit"
          else
            git commit -m "📊 Auto: $(date '+%Y-%m-%d %H:%M') UTC"
          fi

      - name: 推送變更 (帶重試機制)
        run: |
          for i in 1 2 3
          do
            echo "=== 推送嘗試 $i ==="
            # stash 未追蹤的暫存變更，以免 rebase 失敗
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true

            git push && break || {
              echo "推送失敗，等待 10 秒後重試..."
              sleep 10
            }
          done
