name: 資源法 Daily Compute

on:
  workflow_dispatch:

  schedule:
    # 09:30 台灣 = 01:30 UTC
    - cron: "30 1 * * 1-5"
    # 12:00 台灣 = 04:00 UTC
    - cron: "0 4 * * 1-5"
    # 13:30 台灣 = 05:30 UTC
    - cron: "30 5 * * 1-5"
    # 14:30 台灣 = 06:30 UTC
    - cron: "30 6 * * 1-5"
    # 15:30 台灣 = 07:30 UTC（盤後收盤結算）
    - cron: "30 7 * * 1-5"
    # 18:00 台灣 = 10:00 UTC（日結存檔）
    - cron: "0 10 * * 1-5"
    # 20:50 台灣 = 12:50 UTC（日結存檔）
    - cron: "50 12 * * 1-5"

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Taipei
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout 程式碼 ──────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. 設定 Python ─────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. 安裝依賴 ────────────────────────────────────────
      # ✅ 修正：移除 pandas-ta（daily_run.py 未使用）
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "yfinance==0.2.54" \
            "pandas==2.2.3" \
            "numpy>=1.26.4,<2.0" \
            "scipy==1.13.1" \
            "pyarrow==16.1.0" \
            "requests==2.32.3"

      # ── 4. 確認 storage / data 目錄存在 ────────────────────
      - name: Prepare Storage Directories
        run: |
          mkdir -p storage/v4
          mkdir -p storage/v12
          mkdir -p storage/regime
          mkdir -p storage/market
          mkdir -p storage/logs
          mkdir -p data

      # ── 5. 執行主計算流程 ───────────────────────────────────
      - name: Run Daily Compute
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🕐 台灣時間: $(TZ=Asia/Taipei date)"
          python daily_run.py

      # ── 6. 提交更新後的 JSON / CSV 到 GitHub ───────────────
      - name: Commit & Push Storage Updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add storage/ data/

          if git diff --staged --quiet; then
            echo "ℹ️ 無資料變更，跳過 commit"
          else
            TIMESTAMP=$(TZ=Asia/Taipei date +"%Y-%m-%d %H:%M")
            git commit -m "🤖 Auto-update: ${TIMESTAMP} 台灣時間"
            git push
            echo "✅ 資料已推送至 GitHub"
          fi

      # ── 7. 失敗通知 ─────────────────────────────────────────
      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ 計算流程失敗，請檢查 Actions 日誌"
          # 可接入 Slack / Line 通知
